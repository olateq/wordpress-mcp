version: '3'

vars:
  BINARY: wordpress-mcp
  MAIN: .

tasks:
  default:
    desc: Build the wordpress-mcp binary
    cmds:
      - go build -buildvcs=false -ldflags="-s -w" -o {{.BINARY}} {{.MAIN}}

  build:
    desc: Build the wordpress-mcp binary
    cmds:
      - go build -buildvcs=false -ldflags="-s -w" -o {{.BINARY}} {{.MAIN}}

  build-all:
    desc: Build for multiple platforms (linux/amd64, linux/arm64, darwin/amd64, darwin/arm64)
    cmds:
      - GOOS=linux GOARCH=amd64 go build -buildvcs=false -ldflags="-s -w" -o {{.BINARY}}-linux-amd64 {{.MAIN}}
      - GOOS=linux GOARCH=arm64 go build -buildvcs=false -ldflags="-s -w" -o {{.BINARY}}-linux-arm64 {{.MAIN}}
      - GOOS=darwin GOARCH=amd64 go build -buildvcs=false -ldflags="-s -w" -o {{.BINARY}}-darwin-amd64 {{.MAIN}}
      - GOOS=darwin GOARCH=arm64 go build -buildvcs=false -ldflags="-s -w" -o {{.BINARY}}-darwin-arm64 {{.MAIN}}

  run:
    desc: Run the MCP server in stdio mode (reads JSON-RPC from stdin)
    cmds:
      - go run {{.MAIN}}

  run-sse:
    desc: Run the MCP server in SSE/HTTP mode (default :8080, no auth)
    cmds:
      - go run {{.MAIN}} --mode sse --addr :8080

  run-sse-auth:
    desc: Run the MCP server in SSE/HTTP mode with Bearer auth
    cmds:
      - go run {{.MAIN}} --mode sse --addr :8080 --api-key {{.CLI_ARGS}}

  test:
    desc: Run tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}} {{.BINARY}}-linux-amd64 {{.BINARY}}-linux-arm64 {{.BINARY}}-darwin-amd64 {{.BINARY}}-darwin-arm64

  mod:
    desc: Download and tidy dependencies
    cmds:
      - go mod tidy